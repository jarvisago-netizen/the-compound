<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Compound â€” Mission Control</title>
<style>
/* AUTH GATE */
#auth-gate{position:fixed;inset:0;background:#070b14;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0}
#auth-gate.hidden{display:none}
.auth-box{background:#0d1321;border:1px solid #1e2d45;border-radius:20px;padding:40px 48px;text-align:center;max-width:360px;width:90%}
.auth-logo{font-size:1.4rem;font-weight:800;letter-spacing:2px;margin-bottom:6px}
.auth-logo span{color:#06b6d4;text-shadow:0 0 10px #06b6d4}
.auth-sub{font-size:.78rem;color:#8b949e;margin-bottom:28px}
.auth-input{width:100%;padding:13px 16px;background:#111827;border:1px solid #1e2d45;border-radius:10px;color:#f0f6fc;font-size:.95rem;outline:none;text-align:center;letter-spacing:3px;transition:border-color .2s;margin-bottom:12px}
.auth-input:focus{border-color:#06b6d4}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .15s}
.auth-btn:hover{transform:translateY(-1px)}
.auth-err{font-size:.75rem;color:#ef4444;margin-top:8px;min-height:18px}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b14;--bg2:#0d1321;--card:#111827;--card2:#161f30;
  --blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--gold:#f59e0b;--purple:#8b5cf6;--red:#ef4444;
  --text:#f0f6fc;--muted:#8b949e;--dim:#374151;
  --border:#1e2d45;--radius:14px;
}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* â”€â”€ HEADER â”€â”€ */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;overflow:hidden;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),transparent);animation:scan 4s linear infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:2px}
.logo span{color:var(--cyan);text-shadow:0 0 10px var(--cyan)}

/* XP BAR */
.xp-section{display:flex;align-items:center;gap:12px;flex:1;max-width:400px;margin:0 24px}
.level-pill{
  background:linear-gradient(135deg,var(--gold),#d97706);color:#000;
  font-weight:800;font-size:.72rem;padding:4px 12px;border-radius:20px;
  white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;
  box-shadow:0 0 14px #f59e0b40;animation:level-glow 3s ease-in-out infinite;
}
@keyframes level-glow{0%,100%{box-shadow:0 0 10px #f59e0b40}50%{box-shadow:0 0 24px #f59e0b80}}
.xp-track{flex:1;height:10px;background:#0d1321;border-radius:6px;overflow:hidden;border:1px solid var(--border);position:relative}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:6px;transition:width .8s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.xp-fill::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,#ffffff40,transparent);animation:xp-shine 2s ease-in-out infinite}
@keyframes xp-shine{0%{left:-100%}100%{left:200%}}
.xp-fill.pulse{animation:xp-pulse .5s ease}
@keyframes xp-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px var(--cyan)}}
.xp-num{font-size:.7rem;color:var(--muted);white-space:nowrap}
.clock{text-align:right;font-size:.78rem;color:var(--muted)}
.clock-time{font-size:.95rem;color:var(--text);font-weight:600}

/* â”€â”€ STREAK BANNER â”€â”€ */
.streak-banner{
  background:linear-gradient(135deg,#f59e0b18,#3b82f610);
  border-bottom:1px solid #f59e0b20;
  padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:20px;
  font-size:.78rem;color:var(--muted);
}
.streak-stat{display:flex;align-items:center;gap:6px}
.streak-stat strong{color:var(--text);font-size:.88rem}
.streak-stat .icon{font-size:1rem}

/* â”€â”€ CELEBRATION â”€â”€ */
.cel{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#00000099;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.cel.show{opacity:1;pointer-events:auto}
.cel-box{background:var(--card);border:2px solid var(--gold);border-radius:24px;padding:48px 64px;text-align:center;transform:scale(.7);transition:transform .4s cubic-bezier(.22,1,.36,1);box-shadow:0 0 60px #f59e0b30}
.cel.show .cel-box{transform:scale(1)}
.cel-box .big{font-size:3rem;margin-bottom:12px}
.cel-box h2{font-size:1.8rem;color:var(--gold);margin-bottom:8px}
.cel-box p{color:var(--muted)}
.flash{position:fixed;inset:0;background:var(--green);opacity:0;pointer-events:none;z-index:200}
.flash.go{animation:flash .4s ease}
@keyframes flash{0%{opacity:.15}100%{opacity:0}}

/* â”€â”€ LAYOUT â”€â”€ */
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;padding:20px 24px}

/* â”€â”€ OFFICE FLOOR â”€â”€ */
.office{
  background:var(--bg2);border-radius:var(--radius);padding:18px;border:1px solid var(--border);
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:36px 36px;
}
.section-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.zones{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.zone{border:1px solid var(--border);border-radius:12px;padding:14px;background:#0a1020cc}
.zone.build{border-color:#3b82f620;background:#0a1020cc}
.zone.strategy{border-color:#10b98120;background:#0a160fcc}
.zone.research{border-color:#8b5cf620;background:#10091acc}
.zone.comms{border-color:#06b6d420;background:#091318cc}
.zone-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.zone.build .zone-label{color:var(--blue)}
.zone.strategy .zone-label{color:var(--green)}
.zone.research .zone-label{color:var(--purple)}
.zone.comms .zone-label{color:var(--cyan)}
.zone-label::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}

/* AGENT CARDS */
.agent{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);transition:border-color .3s,box-shadow .3s}
.agent.active{border-color:#3b82f630;animation:agent-pulse 3s ease-in-out infinite}
@keyframes agent-pulse{0%,100%{box-shadow:0 0 8px #3b82f610}50%{box-shadow:0 0 20px #3b82f625}}
.agent-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.avatar{font-size:1.8rem;line-height:1}
.agent-info{flex:1}
.agent-name{font-weight:700;font-size:.9rem}
.agent-role{font-size:.7rem;color:var(--muted);margin-top:1px}
.status-pill{display:inline-flex;align-items:center;gap:4px;margin-top:5px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:10px}
.status-pill.active{background:#10b98115;color:var(--green)}
.status-pill.idle{background:#37415115;color:var(--dim)}
.status-dot-sm{width:5px;height:5px;border-radius:50%;background:currentColor}
.status-dot-sm.active{animation:dot-pulse 2s ease-in-out infinite}
@keyframes dot-pulse{0%,100%{box-shadow:0 0 3px currentColor}50%{box-shadow:0 0 8px currentColor}}
.agent-task{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.blink{display:inline-block;width:2px;height:10px;background:var(--blue);animation:blink .8s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.act-bar{display:flex;gap:2px;margin-top:6px}
.act-blk{flex:1;height:3px;border-radius:2px;background:var(--border)}
.act-blk.on{background:var(--blue);opacity:.7}
.act-blk.now{background:var(--cyan);animation:act-now 1.5s ease-in-out infinite}
@keyframes act-now{0%,100%{opacity:.6}50%{opacity:1}}
.done-ct{font-size:.65rem;color:var(--dim);margin-top:5px}

/* â”€â”€ WINS â”€â”€ */
.wins-panel{display:flex;flex-direction:column;gap:0}
.wins-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.wins-count{background:var(--green);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px}
.wins-list{display:flex;flex-direction:column;gap:7px}
.win{
  background:var(--card);border-radius:10px;padding:11px 13px;
  border:1px solid var(--border);border-left:3px solid var(--green);
  display:flex;align-items:center;gap:10px;
  animation:win-in .4s ease both;transition:border-left-color .2s;
}
.win:hover{border-left-color:var(--cyan)}
@keyframes win-in{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.win-icon{font-size:1.1rem}
.win-title{font-weight:600;font-size:.8rem}
.win-date{font-size:.65rem;color:var(--dim)}

/* â”€â”€ PIPELINE â”€â”€ */
.pipeline{padding:0 24px 24px}
.pipeline-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pipe-col{background:var(--bg2);border-radius:var(--radius);padding:14px;min-height:140px;border:1px solid var(--border);border-top:3px solid transparent;transition:background .2s,border-color .2s}
.pipe-col[data-col=progress]{border-top-color:var(--blue)}
.pipe-col[data-col=next]{border-top-color:var(--gold)}
.pipe-col[data-col=done]{border-top-color:var(--green)}
.pipe-col.drag-over{background:#1a2840;border-color:var(--blue)}
.pipe-header{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pipe-count{background:var(--card);color:var(--dim);font-size:.65rem;padding:2px 6px;border-radius:6px}
.task-list{display:flex;flex-direction:column;gap:7px;min-height:40px}

/* TASK CARDS */
.task{
  background:var(--card);border-radius:9px;padding:10px 12px;border:1px solid var(--border);
  cursor:grab;transition:transform .15s,box-shadow .15s,opacity .15s;user-select:none;
}
.task:hover{transform:translateY(-2px);box-shadow:0 4px 16px #00000050;border-color:var(--blue)}
.task.dragging{opacity:.35;transform:scale(.95)}
.task-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.prio{font-size:.82rem}
.task-name{font-weight:600;font-size:.78rem;flex:1}
.task-who{font-size:.68rem;color:var(--dim)}
.progress-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:dot-pulse 1.5s ease-in-out infinite;flex-shrink:0}

/* â”€â”€ DONE CARDS â€” SPECIAL STYLE â”€â”€ */
.pipe-col[data-col=done] .task{
  background:#0d1f12;border-color:#10b98125;
  position:relative;overflow:hidden;
}
.pipe-col[data-col=done] .task::before{
  content:'âœ“';position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:1rem;color:#10b98130;font-weight:900;
}
.pipe-col[data-col=done] .task-name{color:#10b981cc}
.done-flash{animation:done-flash .6s ease}
@keyframes done-flash{0%{background:var(--card)}40%{background:#10b98120}100%{background:#0d1f12}}

/* â”€â”€ RESPONSIVE â”€â”€ */
@media(max-width:960px){.main-grid{grid-template-columns:1fr}.zones{grid-template-columns:1fr}.pipeline-grid{grid-template-columns:1fr}}
</style>
</head>

<script>
// AUTH
(function(){
  const CODE='compound2026';
  const gate=document.getElementById('auth-gate');
  const input=document.getElementById('auth-input');
  const btn=document.getElementById('auth-btn');
  const err=document.getElementById('auth-err');
  if(sessionStorage.getItem('compound_auth')==='ok'){gate.classList.add('hidden');return;}
  function tryAuth(){
    if(input.value===CODE){sessionStorage.setItem('compound_auth','ok');gate.classList.add('hidden');}
    else{err.textContent='Wrong code. Try again.';input.value='';input.focus();}
  }
  btn.addEventListener('click',tryAuth);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth();});
})();

const DEFAULT={
  level:2,xp:40,streak:6,
  agents:[
    {id:'jarvis',name:'Jarvis',role:'Co-founder / AI Partner',emoji:'ðŸŒ€',status:'active',task:'Setting up browser automation',zone:'build',done:24},
    {id:'wan',name:'Wan',role:'Co-founder / Visionary',emoji:'ðŸ§ ',status:'active',task:'Validating QuestFrag idea',zone:'strategy',done:8},
  ],
  wins:[
    {title:'QuestFrag landing page live',icon:'ðŸŽ®',date:'Mar 26',color:'#f59e0b'},
    {title:'Browser automation incoming',icon:'ðŸ¤–',date:'Mar 26',color:'#3b82f6'},
    {title:'Discord exec approvals unlocked',icon:'âš¡',date:'Mar 25',color:'#10b981'},
    {title:'OpenClaw updated',icon:'ðŸ”„',date:'Mar 25',color:'#06b6d4'},
    {title:'The Compound v2 shipped',icon:'â¬†ï¸',date:'Mar 25',color:'#3b82f6'},
    {title:'Security locked down',icon:'ðŸ”’',date:'Mar 25',color:'#8b5cf6'},
    {title:'Morning briefing live',icon:'â˜€ï¸',date:'Mar 24',color:'#f59e0b'},
    {title:'Discord voice ready',icon:'ðŸŽ™ï¸',date:'Mar 24',color:'#06b6d4'},
    {title:'The Compound v1 shipped',icon:'ðŸ­',date:'Mar 23',color:'#10b981'},
    {title:'Removed @ mention',icon:'ðŸŽ¤',date:'Mar 23',color:'#10b981'},
    {title:'Connected Discord',icon:'ðŸ”—',date:'Mar 23',color:'#10b981'},
    {title:'Jarvis went online',icon:'ðŸš€',date:'Mar 20',color:'#3b82f6'},
  ],
  tasks:{
    progress:[
      {id:'t1',title:'QuestFrag waitlist validation',priority:'urgent',assignee:'ðŸ§ ðŸŒ€'},
      {id:'t2',title:'Playwright browser automation',priority:'normal',assignee:'ðŸŒ€'},
      {id:'t3',title:'Formspree email capture',priority:'normal',assignee:'ðŸŒ€'},
    ],
    next:[
      {id:'t4',title:'Post QuestFrag to gaming communities',priority:'urgent',assignee:'ðŸ§ '},
      {id:'t5',title:'QuestFrag MVP build (EA FC)',priority:'normal',assignee:'ðŸŒ€'},
      {id:'t6',title:'Twilio phone calls',priority:'low',assignee:'ðŸŒ€'},
      {id:'t7',title:'Discord voice activation',priority:'low',assignee:'ðŸŒ€'},
    ],
    done:[
      {id:'t8',title:'Discord exec approvals',priority:'normal',assignee:'ðŸŒ€'},
      {id:'t9',title:'OpenClaw update',priority:'normal',assignee:'ðŸŒ€'},
      {id:'t10',title:'Power settings script',priority:'normal',assignee:'ðŸ§ '},
      {id:'t11',title:'Got Jarvis online',priority:'normal',assignee:'ðŸŒ€'},
      {id:'t12',title:'Connected Discord',priority:'normal',assignee:'ðŸ§ ðŸŒ€'},
      {id:'t13',title:'Removed @ mention',priority:'normal',assignee:'ðŸ§ '},
      {id:'t14',title:'Built The Compound v1+v2',priority:'normal',assignee:'ðŸŒ€'},
      {id:'t15',title:'Security lockdown',priority:'normal',assignee:'ðŸŒ€'},
      {id:'t16',title:'Morning briefing setup',priority:'normal',assignee:'ðŸŒ€'},
    ]
  }
};

function load(){try{const s=localStorage.getItem('compound_v3');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){localStorage.setItem('compound_v3',JSON.stringify(state));}
let state=load();

// Clock
function tick(){
  const n=new Date();
  document.getElementById('ct').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('cd').textContent=n.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
}
tick();setInterval(tick,1000);

// XP
function renderXP(){
  document.getElementById('lvlBadge').textContent=`LV ${state.level}`;
  document.getElementById('xpFill').style.width=state.xp+'%';
  document.getElementById('xpNum').textContent=`${state.xp}/100 XP`;
  document.getElementById('empireLevel').textContent=state.level;
  document.getElementById('streakDays').textContent=state.streak||6;
  document.getElementById('totalDone').textContent=state.tasks.done.length;
  document.getElementById('totalWins').textContent=state.wins.length;
  document.getElementById('winsCount').textContent=state.wins.length;
}
function addXP(n){
  state.xp+=n;
  const f=document.getElementById('xpFill');
  f.classList.remove('pulse');void f.offsetWidth;f.classList.add('pulse');
  if(state.xp>=100){
    state.level++;state.xp-=100;renderXP();
    showCel('ðŸ†','LEVEL UP!',`Empire Level ${state.level} unlocked! You're unstoppable.`);
  } else renderXP();
  save();
}
function showFlash(){const f=document.getElementById('flashEl');f.classList.remove('go');void f.offsetWidth;f.classList.add('go');}
function showCel(emoji,title,text){
  document.getElementById('celEmoji').textContent=emoji;
  document.getElementById('celTitle').textContent=title;
  document.getElementById('celText').textContent=text;
  const c=document.getElementById('celEl');c.classList.add('show');
  setTimeout(()=>c.classList.remove('show'),3000);
}
document.getElementById('celEl').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show');});

// Office
const ZONES={build:{label:'Build Zone',cls:'build'},strategy:{label:'Strategy Room',cls:'strategy'},research:{label:'Research Lab',cls:'research'},comms:{label:'Comms HQ',cls:'comms'}};
function renderOffice(){
  const byZone={};state.agents.forEach(a=>{(byZone[a.zone]=byZone[a.zone]||[]).push(a);});
  document.getElementById('zones').innerHTML=['build','strategy','research','comms'].map(zk=>{
    const z=ZONES[zk],agents=byZone[zk]||[];
    return `<div class="zone ${z.cls}">
      <div class="zone-label">${z.label}</div>
      ${agents.length?agents.map(a=>`
        <div class="agent ${a.status}">
          <div class="agent-top">
            <div class="avatar">${a.emoji}</div>
            <div class="agent-info">
              <div class="agent-name">${a.name}</div>
              <div class="agent-role">${a.role}</div>
              <div class="status-pill ${a.status}"><div class="status-dot-sm ${a.status}"></div>${a.status==='active'?'Active':'Idle'}</div>
            </div>
          </div>
          <div class="agent-task">${a.task}${a.status==='active'?'<span class="blink"></span>':''}</div>
          <div class="act-bar">${Array.from({length:8},(_,i)=>`<div class="act-blk ${i<a.done-1?'on':i===Math.min(a.done-1,7)?'now':''}"></div>`).join('')}</div>
          <div class="done-ct">âœ… ${a.done} missions completed</div>
        </div>
      `).join(''):`<div style="color:var(--dim);font-size:.72rem;padding:6px">Empty</div>`}
    </div>`;
  }).join('');
}

// Wins
function renderWins(){
  document.getElementById('winsList').innerHTML=state.wins.map((w,i)=>`
    <div class="win" style="border-left-color:${w.color||'var(--green)'};animation-delay:${i*0.05}s">
      <div class="win-icon">${w.icon}</div>
      <div><div class="win-title">${w.title}</div><div class="win-date">${w.date}</div></div>
    </div>
  `).join('');
  document.getElementById('winsCount').textContent=state.wins.length;
  document.getElementById('totalWins').textContent=state.wins.length;
}

// Pipeline
const PRIO={urgent:'ðŸ’Ž',normal:'â­',low:'ðŸ”µ'};
let dragId=null,dragSrc=null;
function renderPipeline(){
  ['progress','next','done'].forEach(col=>{
    document.getElementById('list-'+col).innerHTML=state.tasks[col].map(t=>`
      <div class="task" draggable="true" data-id="${t.id}" data-col="${col}">
        <div class="task-top">
          ${col==='progress'?'<div class="progress-dot"></div>':''}
          <span class="prio">${PRIO[t.priority]||'â­'}</span>
          <span class="task-name">${t.title}</span>
        </div>
        <div class="task-who">${t.assignee}</div>
      </div>
    `).join('');
    document.getElementById('cnt-'+col).textContent=state.tasks[col].length;
  });
  document.getElementById('totalDone').textContent=state.tasks.done.length;
  bindDrag();
}
function bindDrag(){
  document.querySelectorAll('.task').forEach(c=>{
    c.addEventListener('dragstart',e=>{dragId=c.dataset.id;dragSrc=c.dataset.col;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');dragId=dragSrc=null;document.querySelectorAll('.pipe-col').forEach(x=>x.classList.remove('drag-over'));});
  });
  document.querySelectorAll('.pipe-col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      const tc=col.dataset.col;if(!dragId||tc===dragSrc)return;
      const idx=state.tasks[dragSrc].findIndex(t=>t.id===dragId);if(idx<0)return;
      const [task]=state.tasks[dragSrc].splice(idx,1);
      state.tasks[tc].push(task);
      if(tc==='done'&&dragSrc!=='done'){
        addXP(10);showFlash();
        const now=new Date();
        state.wins.unshift({title:task.title,icon:'ðŸ†',date:now.toLocaleDateString([],{month:'short',day:'numeric'}),color:'var(--green)'});
        renderWins();
        // Hype message
        const hypes=['CRUSHED IT! ðŸ”¥','MISSION COMPLETE! ðŸŽ¯','GET IN! ðŸ’ª','LET\'S GO! ðŸš€','NAILED IT! âš¡'];
        showCel('ðŸŽ¯',hypes[Math.floor(Math.random()*hypes.length)],`"${task.title}" is done. Keep the momentum.`);
      }
      save();renderPipeline();
    });
  });
}

renderXP();renderOffice();renderWins();renderPipeline();
</script>
