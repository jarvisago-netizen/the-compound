<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Compound — Mission Control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg-mid:#0f1624;--bg-card:#111827;--bg-card-hover:#1a2234;
  --blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--purple:#8b5cf6;--yellow:#f59e0b;--red:#ef4444;
  --text:#f0f6fc;--muted:#8b949e;--dim:#4b5563;
  --border:#1e2a3a;--radius:14px;
}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;background:var(--bg-mid);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,#3b82f610,#06b6d408,transparent);
  animation:header-shimmer 6s ease-in-out infinite;pointer-events:none;
}
@keyframes header-shimmer{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
.logo{font-size:1.3rem;font-weight:800;letter-spacing:2px;color:var(--text);position:relative}
.logo span{color:var(--cyan);text-shadow:0 0 12px var(--cyan)}
.empire{display:flex;align-items:center;gap:12px;position:relative}
.empire-badge{
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;font-weight:700;font-size:.78rem;
  padding:4px 14px;border-radius:20px;white-space:nowrap;
  box-shadow:0 0 12px #3b82f640;
}
.xp-wrap{display:flex;align-items:center;gap:8px;min-width:180px}
.xp-outer{flex:1;height:12px;background:#1a2234;border-radius:8px;overflow:hidden;border:1px solid var(--border);position:relative}
.xp-inner{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:8px;transition:width .6s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.xp-inner::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,#ffffff30,transparent);animation:shimmer 2.5s ease-in-out infinite}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
.xp-inner.pulse{animation:xp-pulse .6s ease}
@keyframes xp-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px var(--cyan)}}
.xp-label{font-size:.72rem;color:var(--muted);white-space:nowrap}
.clock{text-align:right;font-size:.82rem;color:var(--muted);min-width:140px}
.clock-time{font-size:1.05rem;color:var(--text);font-weight:600}

/* CELEBRATION */
.celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#00000099;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.celebration.show{opacity:1;pointer-events:auto}
.cel-inner{background:var(--bg-card);border:2px solid var(--cyan);border-radius:20px;padding:40px 60px;text-align:center;transform:scale(.8);transition:transform .4s cubic-bezier(.22,1,.36,1);box-shadow:0 0 40px #06b6d430}
.celebration.show .cel-inner{transform:scale(1)}
.cel-inner h2{font-size:2rem;color:var(--cyan);margin-bottom:8px}
.cel-inner p{color:var(--muted)}
.flash{position:fixed;inset:0;background:var(--cyan);opacity:0;pointer-events:none;z-index:200}
.flash.go{animation:flash-anim .4s ease}
@keyframes flash-anim{0%{opacity:.12}100%{opacity:0}}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 300px;gap:20px;padding:20px 28px}
.office-wrap{display:flex;flex-direction:column;gap:20px}
.section-title{font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* OFFICE FLOOR */
.office-floor{
  background:var(--bg-mid);border-radius:var(--radius);padding:20px;border:1px solid var(--border);
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
}
.zones{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.zone{background:#0f1624cc;border:1px solid var(--border);border-radius:12px;padding:14px;position:relative}
.zone-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.zone-label::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.zone.build .zone-label{color:var(--blue)}
.zone.build{border-color:#3b82f620;background:#0d1625cc}
.zone.strategy .zone-label{color:var(--green)}
.zone.strategy{border-color:#10b98120;background:#0d1a14cc}
.zone.research .zone-label{color:var(--purple)}
.zone.research{border-color:#8b5cf620;background:#13101acc}
.zone.comms .zone-label{color:var(--cyan)}
.zone.comms{border-color:#06b6d420;background:#0b1518cc}

/* AGENT CARDS */
.agent-card{
  background:var(--bg-card);border-radius:12px;padding:16px;border:1px solid var(--border);
  transition:border-color .3s,box-shadow .3s;cursor:default;
}
.agent-card:hover{border-color:var(--blue);box-shadow:0 0 20px #3b82f615}
.agent-card.status-active{border-color:#3b82f630;animation:active-glow 3s ease-in-out infinite}
.agent-card.status-thinking{border-color:#8b5cf630;animation:think-glow 2s ease-in-out infinite}
.agent-card.status-researching{border-color:#10b98130}
@keyframes active-glow{0%,100%{box-shadow:0 0 8px #3b82f615}50%{box-shadow:0 0 20px #3b82f625}}
@keyframes think-glow{0%,100%{box-shadow:0 0 8px #8b5cf615}50%{box-shadow:0 0 20px #8b5cf630}}
.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.avatar{font-size:2rem;line-height:1;position:relative}
.agent-info{flex:1}
.agent-name{font-weight:700;font-size:.95rem}
.agent-role{font-size:.72rem;color:var(--muted);margin-top:2px}
.status-badge{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.status-dot{width:8px;height:8px;border-radius:50%;position:relative;flex-shrink:0}
.status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green);animation:dot-pulse 2s ease-in-out infinite}
.status-dot.thinking{background:var(--purple);animation:dot-think 1.5s ease-in-out infinite}
.status-dot.researching{background:var(--cyan)}
.status-dot.idle{background:var(--dim)}
@keyframes dot-pulse{0%,100%{box-shadow:0 0 4px var(--green)}50%{box-shadow:0 0 12px var(--green),0 0 20px #10b98150}}
@keyframes dot-think{0%,100%{box-shadow:0 0 4px var(--purple);transform:scale(1)}50%{box-shadow:0 0 10px var(--purple);transform:scale(1.3)}}
.status-badge.active{color:var(--green)}
.status-badge.thinking{color:var(--purple)}
.status-badge.researching{color:var(--cyan)}
.status-badge.idle{color:var(--dim)}
.task-line{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.task-cursor{display:inline-block;width:2px;height:11px;background:var(--blue);animation:blink .8s step-end infinite;vertical-align:middle}
.thinking-dots span{animation:dot-bounce .8s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:.15s}
.thinking-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot-bounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
.zzz{font-size:.7rem;color:var(--dim);animation:zzz-float 2s ease-in-out infinite}
@keyframes zzz-float{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-4px);opacity:1}}
.activity-bar{display:flex;gap:2px;margin-top:8px}
.activity-block{height:4px;flex:1;border-radius:2px;background:var(--border)}
.activity-block.filled{background:var(--blue);opacity:.6}
.activity-block.recent{background:var(--cyan);opacity:.9;animation:activity-pulse 1.5s ease-in-out infinite}
@keyframes activity-pulse{0%,100%{opacity:.6}50%{opacity:1}}
.done-count{font-size:.68rem;color:var(--dim);margin-top:6px}

/* WIN WALL */
.win-wall-wrap{display:flex;flex-direction:column;gap:0}
.wins{display:flex;flex-direction:column;gap:8px}
.win{
  background:var(--bg-card);border-radius:10px;padding:12px 14px;
  border:1px solid var(--border);border-left:3px solid var(--green);
  display:flex;align-items:center;gap:10px;
  animation:slide-in .4s ease both;transition:border-color .2s;
}
.win:hover{border-left-color:var(--cyan)}
.win:nth-child(1){animation-delay:.05s}
.win:nth-child(2){animation-delay:.1s}
.win:nth-child(3){animation-delay:.15s}
.win:nth-child(4){animation-delay:.2s}
.win:nth-child(5){animation-delay:.25s}
@keyframes slide-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.win-icon{font-size:1.2rem}
.win-text{flex:1}
.win-title{font-weight:600;font-size:.83rem}
.win-date{font-size:.68rem;color:var(--dim)}
.win-count{background:var(--green);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px}

/* PIPELINE */
.pipeline{padding:0 28px 28px}
.pipeline-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pipeline-col{background:var(--bg-mid);border-radius:var(--radius);padding:16px;min-height:160px;border:1px solid var(--border);border-top:3px solid transparent;transition:background .2s,border-color .2s}
.pipeline-col[data-col=progress]{border-top-color:var(--blue)}
.pipeline-col[data-col=next]{border-top-color:var(--yellow)}
.pipeline-col[data-col=done]{border-top-color:var(--green)}
.pipeline-col.drag-over{background:#1a2234;border-color:var(--blue)}
.col-header{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.col-count{background:var(--bg-card);color:var(--dim);font-size:.68rem;padding:2px 7px;border-radius:8px}
.task-list{display:flex;flex-direction:column;gap:8px;min-height:50px}
.task-card{background:var(--bg-card);border-radius:10px;padding:11px 13px;border:1px solid var(--border);cursor:grab;transition:transform .15s,box-shadow .15s,opacity .15s;user-select:none}
.task-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px #00000040;border-color:var(--blue)}
.task-card.dragging{opacity:.4;transform:scale(.96)}
.task-card-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.priority{font-size:.85rem}
.task-title{font-weight:600;font-size:.82rem;flex:1}
.task-assignee{font-size:.72rem;color:var(--dim)}
.task-progress-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:dot-pulse 1.5s ease-in-out infinite;flex-shrink:0}
.done-card{animation:card-done .5s ease}
@keyframes card-done{0%{background:var(--bg-card)}40%{background:#10b98115}100%{background:var(--bg-card)}}

/* RESPONSIVE */
@media(max-width:1000px){.layout{grid-template-columns:1fr}.zones{grid-template-columns:1fr}.pipeline-cols{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">THE <span>COMPOUND</span></div>
  <div class="empire">
    <div class="empire-badge" id="levelBadge">Empire Lv. 1</div>
    <div class="xp-wrap">
      <div class="xp-outer"><div class="xp-inner" id="xpBar" style="width:30%"></div></div>
      <div class="xp-label" id="xpLabel">30 / 100 XP</div>
    </div>
  </div>
  <div class="clock"><div class="clock-time" id="clockTime"></div><div id="clockDate"></div></div>
</header>

<div class="flash" id="flash"></div>
<div class="celebration" id="cel"><div class="cel-inner"><h2 id="celTitle">LEVEL UP!</h2><p id="celText"></p></div></div>

<div class="layout">
  <div class="office-wrap">
    <div class="office-floor">
      <div class="section-title">Office Floor</div>
      <div class="zones" id="zones"></div>
    </div>
  </div>

  <div>
    <div class="section-title">Win Wall <span class="win-count" id="winCount">0</span></div>
    <div class="wins" id="wins"></div>
  </div>
</div>

<div class="pipeline">
  <div class="section-title" style="margin-bottom:16px">Task Pipeline</div>
  <div class="pipeline-cols">
    <div class="pipeline-col" id="col-progress" data-col="progress">
      <div class="col-header" style="color:var(--blue)">🔵 In Progress <span class="col-count" id="count-progress">0</span></div>
      <div class="task-list" id="list-progress"></div>
    </div>
    <div class="pipeline-col" id="col-next" data-col="next">
      <div class="col-header" style="color:var(--yellow)">⭐ Up Next <span class="col-count" id="count-next">0</span></div>
      <div class="task-list" id="list-next"></div>
    </div>
    <div class="pipeline-col" id="col-done" data-col="done">
      <div class="col-header" style="color:var(--green)">✅ Done <span class="col-count" id="count-done">0</span></div>
      <div class="task-list" id="list-done"></div>
    </div>
  </div>
</div>

<script>
const DEFAULT = {
  level:2, xp:40,
  agents:[
    {id:'jarvis',name:'Jarvis',role:'Co-founder / AI Partner',emoji:'🌀',status:'active',task:'Installing Playwright browser automation',zone:'build',done:24},
    {id:'wan',name:'Wan',role:'Co-founder / Visionary',emoji:'🧠',status:'active',task:'Validating QuestPath idea',zone:'strategy',done:8},
  ],
  wins:[
    {title:'QuestPath landing page live',icon:'🎮',date:'Mar 26',color:'#f59e0b'},
    {title:'Browser automation setup',icon:'🤖',date:'Mar 26',color:'#3b82f6'},
    {title:'Discord exec approvals working',icon:'⚡',date:'Mar 25',color:'#10b981'},
    {title:'OpenClaw updated to latest',icon:'🔄',date:'Mar 25',color:'#06b6d4'},
    {title:'Built The Compound v2',icon:'⬆️',date:'Mar 25',color:'#3b82f6'},
    {title:'Security lockdown',icon:'🔒',date:'Mar 25',color:'#8b5cf6'},
    {title:'Morning briefing set up',icon:'☀️',date:'Mar 24',color:'#f59e0b'},
    {title:'Discord voice configured',icon:'🎙️',date:'Mar 24',color:'#06b6d4'},
    {title:'Built The Compound v1',icon:'🏭',date:'Mar 23',color:'#10b981'},
    {title:'Removed @ mention',icon:'🎤',date:'Mar 23',color:'#10b981'},
    {title:'Connected Discord',icon:'🔗',date:'Mar 23',color:'#10b981'},
    {title:'Got Jarvis online',icon:'🚀',date:'Mar 20',color:'#3b82f6'},
  ],
  tasks:{
    progress:[
      {id:'t1',title:'QuestPath waitlist validation',priority:'urgent',assignee:'🧠🌀'},
      {id:'t2',title:'Playwright browser automation',priority:'normal',assignee:'🌀'},
      {id:'t3',title:'Formspree email capture setup',priority:'normal',assignee:'🌀'},
    ],
    next:[
      {id:'t4',title:'Post QuestPath to gaming communities',priority:'urgent',assignee:'🧠'},
      {id:'t5',title:'QuestPath MVP build (EA FC first)',priority:'normal',assignee:'🌀'},
      {id:'t6',title:'Twilio phone calls',priority:'low',assignee:'🌀'},
      {id:'t7',title:'Discord voice activation',priority:'low',assignee:'🌀'},
    ],
    done:[
      {id:'t8',title:'Discord exec approvals',priority:'normal',assignee:'🌀'},
      {id:'t9',title:'OpenClaw update',priority:'normal',assignee:'🌀'},
      {id:'t10',title:'Power settings script',priority:'normal',assignee:'🧠'},
      {id:'t11',title:'Get Jarvis online',priority:'normal',assignee:'🌀'},
      {id:'t12',title:'Connect Discord',priority:'normal',assignee:'🧠🌀'},
      {id:'t13',title:'Remove @ mention',priority:'normal',assignee:'🧠'},
      {id:'t14',title:'Build The Compound v1+v2',priority:'normal',assignee:'🌀'},
      {id:'t15',title:'Security lockdown',priority:'normal',assignee:'🌀'},
      {id:'t16',title:'Morning briefing',priority:'normal',assignee:'🌀'},
    ]
  }
};

function load(){try{const s=localStorage.getItem('compound_v2');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){localStorage.setItem('compound_v2',JSON.stringify(state));}
let state=load();

// Clock
function tick(){
  const n=new Date();
  document.getElementById('clockTime').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clockDate').textContent=n.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
}
tick();setInterval(tick,1000);

// XP
function renderXP(){
  document.getElementById('levelBadge').textContent=`Empire Lv. ${state.level}`;
  document.getElementById('xpBar').style.width=state.xp+'%';
  document.getElementById('xpLabel').textContent=`${state.xp} / 100 XP`;
}
function addXP(n){
  state.xp+=n;
  const bar=document.getElementById('xpBar');
  bar.classList.remove('pulse');void bar.offsetWidth;bar.classList.add('pulse');
  if(state.xp>=100){
    state.level++;state.xp-=100;renderXP();
    const c=document.getElementById('cel');
    document.getElementById('celText').textContent=`Empire Level ${state.level} unlocked`;
    c.classList.add('show');setTimeout(()=>c.classList.remove('show'),2500);
  } else renderXP();
  save();
}
function flash(){
  const f=document.getElementById('flash');
  f.classList.remove('go');void f.offsetWidth;f.classList.add('go');
}

// Status helpers
function statusLabel(s){return{active:'● Active',thinking:'◉ Thinking',researching:'🔍 Researching',idle:'◌ Idle'}[s]||s;}
function taskHTML(agent){
  if(agent.status==='idle') return `<div class="task-line"><span class="zzz">💤 zZz...</span></div>`;
  if(agent.status==='thinking') return `<div class="task-line">${agent.task} <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  if(agent.status==='active') return `<div class="task-line">${agent.task} <span class="task-cursor"></span></div>`;
  return `<div class="task-line">${agent.task}</div>`;
}
function activityBar(n){
  const total=8;let h='<div class="activity-bar">';
  for(let i=0;i<total;i++){
    const cl=i<n-1?'filled':i===n-1?'recent':'';
    h+=`<div class="activity-block ${cl}"></div>`;
  }
  return h+'</div>';
}

// Zones config
const ZONES={
  build:{label:'Build Zone',cls:'build'},
  strategy:{label:'Strategy Room',cls:'strategy'},
  research:{label:'Research Lab',cls:'research'},
  comms:{label:'Comms HQ',cls:'comms'},
};

// Render office
function renderOffice(){
  const container=document.getElementById('zones');
  // Group agents by zone
  const byZone={};
  state.agents.forEach(a=>{(byZone[a.zone]=byZone[a.zone]||[]).push(a);});
  // Show occupied zones + empty placeholder zones
  const allZones=['build','strategy','research','comms'];
  container.innerHTML=allZones.map(zk=>{
    const z=ZONES[zk];
    const agents=(byZone[zk]||[]);
    return `<div class="zone ${z.cls}">
      <div class="zone-label">${z.label}</div>
      ${agents.length?agents.map(a=>`
        <div class="agent-card status-${a.status}">
          <div class="card-top">
            <div class="avatar">${a.emoji}</div>
            <div class="agent-info">
              <div class="agent-name">${a.name}</div>
              <div class="agent-role">${a.role}</div>
              <div class="status-badge ${a.status}"><div class="status-dot ${a.status}"></div>${statusLabel(a.status)}</div>
            </div>
          </div>
          ${taskHTML(a)}
          ${activityBar(Math.min(a.done,8))}
          <div class="done-count">✅ ${a.done} tasks completed</div>
        </div>
      `).join(''):`<div style="color:var(--dim);font-size:.75rem;padding:8px">Empty</div>`}
    </div>`;
  }).join('');
}

// Render wins
function renderWins(){
  document.getElementById('wins').innerHTML=state.wins.map(w=>`
    <div class="win" style="border-left-color:${w.color||'var(--green)'}">
      <div class="win-icon">${w.icon}</div>
      <div class="win-text"><div class="win-title">${w.title}</div><div class="win-date">${w.date}</div></div>
    </div>
  `).join('');
  document.getElementById('winCount').textContent=state.wins.length;
}

// Pipeline
const PRIO={urgent:'💎',normal:'⭐',low:'🔵'};
let dragId=null,dragSrc=null;

function renderPipeline(){
  ['progress','next','done'].forEach(col=>{
    document.getElementById('list-'+col).innerHTML=state.tasks[col].map(t=>`
      <div class="task-card" draggable="true" data-id="${t.id}" data-col="${col}">
        <div class="task-card-top">
          ${col==='progress'?'<div class="task-progress-dot"></div>':''}
          <span class="priority">${PRIO[t.priority]||'⭐'}</span>
          <span class="task-title">${t.title}</span>
        </div>
        <div class="task-assignee">${t.assignee}</div>
      </div>
    `).join('');
    document.getElementById('count-'+col).textContent=state.tasks[col].length;
  });
  bindDrag();
}

function bindDrag(){
  document.querySelectorAll('.task-card').forEach(c=>{
    c.addEventListener('dragstart',e=>{dragId=c.dataset.id;dragSrc=c.dataset.col;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');dragId=dragSrc=null;document.querySelectorAll('.pipeline-col').forEach(x=>x.classList.remove('drag-over'));});
  });
  document.querySelectorAll('.pipeline-col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      const tc=col.dataset.col;
      if(!dragId||tc===dragSrc)return;
      const idx=state.tasks[dragSrc].findIndex(t=>t.id===dragId);
      if(idx<0)return;
      const [task]=state.tasks[dragSrc].splice(idx,1);
      state.tasks[tc].push(task);
      if(tc==='done'&&dragSrc!=='done'){
        addXP(10);flash();
        const now=new Date();
        state.wins.unshift({title:task.title,icon:'🏆',date:now.toLocaleDateString([],{month:'short',day:'numeric'}),color:'var(--green)'});
        renderWins();
      }
      save();renderPipeline();
    });
  });
}

// Init
renderXP();renderOffice();renderWins();renderPipeline();
</script>
</body>
</html>
