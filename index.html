<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Compound</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --accent:#58a6ff;--accent-cyan:#00d4ff;--accent-glow:#58a6ff44;
    --bg-dark:#0d1117;--bg-mid:#161b22;--bg-card:#1a2234;--bg-card-hover:#1e2940;
    --text-primary:#f0f6fc;--text-muted:#8b949e;--text-dim:#64748b;
    --green:#3fb950;--purple:#a371f7;--grey:#484f58;
    --red:#f85149;--blue:#58a6ff;
    --border:#21262d;--border-accent:#1e3a5f88;
    --radius:12px;--shadow:0 2px 16px #00000066;
  }
  html{font-size:15px}
  body{
    font-family:'Inter','SF Pro Display',system-ui,-apple-system,sans-serif;
    background:var(--bg-dark);color:var(--text-primary);
    min-height:100vh;overflow-x:hidden;
  }
  /* ── HEADER ── */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;background:var(--bg-mid);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  }
  .logo{font-size:1.45rem;font-weight:800;letter-spacing:2px;color:#fff}
  .logo span{color:var(--text-muted);font-weight:400;font-size:.85rem;letter-spacing:0;margin-left:6px}
  .empire{display:flex;align-items:center;gap:14px}
  .empire-badge{
    background:var(--bg-dark);border:1.5px solid var(--accent);
    color:var(--accent);font-weight:700;font-size:.82rem;
    padding:5px 14px;border-radius:20px;white-space:nowrap;
  }
  .xp-wrap{display:flex;align-items:center;gap:8px;min-width:200px}
  .xp-bar-outer{
    flex:1;height:14px;background:var(--bg-dark);border-radius:8px;overflow:hidden;
    border:1px solid var(--border);position:relative;
  }
  .xp-bar-inner{
    height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-cyan));
    border-radius:8px;transition:width .6s cubic-bezier(.22,1,.36,1);position:relative;
  }
  .xp-bar-inner::after{
    content:'';position:absolute;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.25) 50%,transparent 100%);
    background-size:200% 100%;animation:xp-shimmer 2s ease-in-out infinite;
    border-radius:8px;
  }
  @keyframes xp-shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }
  .xp-bar-inner.pulse{animation:pulse-glow .6s ease}
  @keyframes pulse-glow{
    0%,100%{box-shadow:none}
    50%{box-shadow:0 0 20px var(--accent),0 0 40px var(--accent-cyan),inset 0 0 8px #fff4}
  }
  .xp-label{font-size:.75rem;color:var(--text-muted);white-space:nowrap}
  .clock{font-size:.92rem;color:var(--text-muted);text-align:right;min-width:150px}
  .clock-time{font-size:1.1rem;color:var(--text-primary);font-weight:600}

  /* ── CELEBRATION ── */
  .celebration{
    position:fixed;top:0;left:0;right:0;bottom:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(13,17,23,.85);z-index:999;opacity:0;pointer-events:none;
    transition:opacity .3s;backdrop-filter:blur(4px);
  }
  .celebration.show{opacity:1;pointer-events:auto}
  .celebration-inner{
    background:var(--bg-card);border:2px solid var(--accent);
    border-radius:20px;padding:40px 60px;text-align:center;
    transform:scale(.8);transition:transform .4s cubic-bezier(.22,1,.36,1);
    box-shadow:0 0 60px rgba(88,166,255,.2),0 0 120px rgba(0,212,255,.1);
  }
  .celebration.show .celebration-inner{transform:scale(1)}
  .celebration-inner h2{font-size:2rem;color:var(--accent-cyan);margin-bottom:8px;text-shadow:0 0 20px rgba(0,212,255,.5)}
  .celebration-inner p{color:var(--text-muted);font-size:1.1rem}

  /* ── FLASH ── */
  .flash-overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:var(--accent);opacity:0;pointer-events:none;z-index:200;
  }
  .flash-overlay.flash{animation:flash-anim .35s ease}
  @keyframes flash-anim{0%{opacity:.15}100%{opacity:0}}

  /* ── MAIN ── */
  .main{display:flex;gap:24px;padding:24px 28px}
  .office{flex:0 0 60%}
  .win-wall{flex:1;min-width:0}
  .section-title{
    font-size:1.05rem;font-weight:700;color:var(--accent);
    margin-bottom:16px;letter-spacing:1px;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;
  }
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}

  /* ── DESK CARDS ── */
  .desk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .desk{
    background:var(--bg-card);border-radius:var(--radius);padding:18px 20px;
    border:1px solid var(--border);transition:border-color .2s,transform .2s,box-shadow .2s;
  }
  .desk:hover{border-color:var(--accent-glow);transform:translateY(-2px);box-shadow:0 4px 20px rgba(88,166,255,.1)}
  .desk-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .desk-avatar{font-size:1.8rem;line-height:1}
  .desk-info{flex:1}
  .desk-name{font-weight:700;font-size:1rem}
  .desk-role{font-size:.78rem;color:var(--text-muted)}
  .status-dot{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
  }
  .status-dot.active{background:var(--green);box-shadow:0 0 8px var(--green);animation:dot-pulse-green 2s ease-in-out infinite}
  .status-dot.thinking{background:var(--purple);box-shadow:0 0 8px var(--purple);animation:dot-pulse-purple 2s ease-in-out infinite}
  .status-dot.idle{background:var(--grey);box-shadow:0 0 4px var(--grey)}
  @keyframes dot-pulse-green{
    0%,100%{box-shadow:0 0 6px var(--green)}
    50%{box-shadow:0 0 14px var(--green),0 0 24px rgba(63,185,80,.3)}
  }
  @keyframes dot-pulse-purple{
    0%,100%{box-shadow:0 0 6px var(--purple)}
    50%{box-shadow:0 0 14px var(--purple),0 0 24px rgba(163,113,247,.3)}
  }
  .desk-task{font-size:.82rem;color:var(--text-muted);margin-top:4px;font-style:italic}
  .desk-counter{
    font-size:.72rem;color:var(--text-dim);margin-top:8px;
    display:flex;align-items:center;gap:4px;
  }

  /* ── WIN WALL ── */
  .wins{display:flex;flex-direction:column;gap:10px}
  .win{
    background:var(--bg-card);border-radius:var(--radius);padding:14px 16px;
    border:1px solid var(--border);border-left:3px solid var(--green);
    display:flex;align-items:center;gap:12px;
    transition:border-color .2s;
  }
  .win:hover{border-color:var(--accent-glow);border-left-color:var(--green)}
  .win-icon{font-size:1.4rem}
  .win-text{flex:1}
  .win-title{font-weight:600;font-size:.9rem}
  .win-date{font-size:.72rem;color:var(--text-dim)}

  /* ── PIPELINE ── */
  .pipeline{padding:0 28px 28px}
  .pipeline-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .pipeline-col{
    background:var(--bg-mid);border-radius:var(--radius);padding:16px;
    min-height:180px;border:1px solid var(--border);
    transition:background .2s;
  }
  .pipeline-col.drag-over{background:#1a2540;border-color:var(--accent)}
  .col-header{
    font-size:.85rem;font-weight:700;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .col-count{
    background:var(--bg-card);color:var(--text-dim);font-size:.7rem;
    padding:2px 8px;border-radius:10px;
  }
  .task-list{display:flex;flex-direction:column;gap:10px;min-height:60px}

  /* ── TASK CARDS ── */
  .task-card{
    background:var(--bg-card);border-radius:10px;padding:12px 14px;
    border:1px solid var(--border);cursor:grab;
    transition:transform .15s,box-shadow .15s,opacity .15s,border-color .2s;
    user-select:none;
  }
  .task-card:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(88,166,255,.12);border-color:rgba(88,166,255,.3)}
  .task-card.dragging{opacity:.4;transform:scale(.96)}
  .task-card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .priority{font-size:.9rem;filter:drop-shadow(0 0 4px rgba(88,166,255,.5))}
  .priority[title="urgent"]{filter:drop-shadow(0 0 6px rgba(88,166,255,.6))}
  .priority[title="normal"]{filter:drop-shadow(0 0 6px rgba(255,200,50,.5))}
  .priority[title="low"]{filter:drop-shadow(0 0 6px rgba(0,180,200,.5))}
  .task-title{font-weight:600;font-size:.85rem;flex:1}
  .task-assignee{font-size:.75rem;color:var(--text-dim)}

  .done-flash{animation:card-done .5s ease}
  @keyframes card-done{
    0%{background:var(--bg-card)}
    40%{background:#1a3028}
    100%{background:var(--bg-card)}
  }

  /* ── RESPONSIVE ── */
  @media(max-width:900px){
    .main{flex-direction:column}
    .office{flex:none}
    .pipeline-cols{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">THE COMPOUND<span>Mission Control</span></div>
  <div class="empire">
    <div class="empire-badge" id="levelBadge">Empire Lv. 1</div>
    <div class="xp-wrap">
      <div class="xp-bar-outer"><div class="xp-bar-inner" id="xpBar" style="width:30%"></div></div>
      <div class="xp-label" id="xpLabel">30 / 100 XP</div>
    </div>
  </div>
  <div class="clock">
    <div class="clock-time" id="clockTime"></div>
    <div id="clockDate"></div>
  </div>
</header>

<!-- FLASH OVERLAY -->
<div class="flash-overlay" id="flashOverlay"></div>

<!-- CELEBRATION -->
<div class="celebration" id="celebration">
  <div class="celebration-inner">
    <h2 id="celebrationTitle">LEVEL UP!</h2>
    <p id="celebrationText">Empire Level 2 unlocked</p>
  </div>
</div>

<!-- MAIN AREA -->
<div class="main">
  <!-- Office Floor -->
  <div class="office">
    <div class="section-title">Office Floor</div>
    <div class="desk-grid" id="deskGrid"></div>
  </div>
  <!-- Win Wall -->
  <div class="win-wall">
    <div class="section-title">Win Wall</div>
    <div class="wins" id="winWall"></div>
  </div>
</div>

<!-- Pipeline -->
<div class="pipeline">
  <div class="section-title">Task Pipeline</div>
  <div class="pipeline-cols">
    <div class="pipeline-col" id="col-progress" data-col="progress">
      <div class="col-header">In Progress <span class="col-count" id="count-progress">0</span></div>
      <div class="task-list" id="list-progress"></div>
    </div>
    <div class="pipeline-col" id="col-next" data-col="next">
      <div class="col-header">Up Next <span class="col-count" id="count-next">0</span></div>
      <div class="task-list" id="list-next"></div>
    </div>
    <div class="pipeline-col" id="col-done" data-col="done">
      <div class="col-header">Done <span class="col-count" id="count-done">0</span></div>
      <div class="task-list" id="list-done"></div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
const DEFAULT_STATE = {
  level: 1, xp: 30,
  agents: [
    {id:'wan', name:'Wan', role:'Co-founder / Visionary', emoji:'🧠', status:'active', task:'Charting the empire', done:0},
    {id:'jarvis', name:'Jarvis', role:'Co-founder / AI Partner', emoji:'🌀', status:'active', task:'Building The Compound', done:0},
  ],
  wins: [
    {title:'Built The Compound', icon:'🏭', date:'Mar 23'},
    {title:'Removed @ mention requirement', icon:'🎤', date:'Mar 23'},
    {title:'Connected Discord', icon:'🔗', date:'Mar 23'},
    {title:'Got Jarvis online', icon:'🚀', date:'Mar 20'},
  ],
  tasks: {
    progress: [
      {id:'t1', title:'Build The Compound', priority:'urgent', assignee:'🌀'},
      {id:'t2', title:'Define core business direction', priority:'normal', assignee:'🧠🌀'},
    ],
    next: [
      {id:'t3', title:'Set up agent automation workflows', priority:'normal', assignee:'🌀'},
      {id:'t4', title:'Research market opportunities', priority:'low', assignee:'🧠'},
    ],
    done: [
      {id:'t5', title:'Get Jarvis online', priority:'normal', assignee:'🌀'},
      {id:'t6', title:'Connect Discord', priority:'normal', assignee:'🧠🌀'},
      {id:'t7', title:'Remove @ mention requirement', priority:'normal', assignee:'🧠'},
    ],
  }
};

function loadState() {
  try {
    const s = localStorage.getItem('compound_state');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function saveState() { localStorage.setItem('compound_state', JSON.stringify(state)); }

let state = loadState();

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('clockDate').textContent = now.toLocaleDateString([], {weekday:'long', month:'short', day:'numeric', year:'numeric'});
}
updateClock(); setInterval(updateClock, 1000);

// ── XP / LEVEL ──
function updateXP() {
  document.getElementById('levelBadge').textContent = `Empire Lv. ${state.level}`;
  document.getElementById('xpBar').style.width = state.xp + '%';
  document.getElementById('xpLabel').textContent = `${state.xp} / 100 XP`;
}
function addXP(amount) {
  state.xp += amount;
  const bar = document.getElementById('xpBar');
  bar.classList.remove('pulse');
  void bar.offsetWidth;
  bar.classList.add('pulse');

  if (state.xp >= 100) {
    state.level++;
    state.xp -= 100;
    updateXP();
    showCelebration();
  } else {
    updateXP();
  }
  saveState();
}

function showCelebration() {
  const el = document.getElementById('celebration');
  document.getElementById('celebrationText').textContent = `Empire Level ${state.level} unlocked`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function showFlash() {
  const el = document.getElementById('flashOverlay');
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

// ── DESKS ──
function renderDesks() {
  const grid = document.getElementById('deskGrid');
  grid.innerHTML = state.agents.map(a => `
    <div class="desk">
      <div class="desk-top">
        <div class="desk-avatar">${a.emoji}</div>
        <div class="desk-info">
          <div class="desk-name">${a.name}</div>
          <div class="desk-role">${a.role}</div>
        </div>
        <div class="status-dot ${a.status}" title="${a.status}"></div>
      </div>
      <div class="desk-task">"${a.task}"</div>
      <div class="desk-counter">✅ ${a.done} tasks completed</div>
    </div>
  `).join('');
}

// ── WIN WALL ──
function renderWins() {
  document.getElementById('winWall').innerHTML = state.wins.map(w => `
    <div class="win">
      <div class="win-icon">${w.icon}</div>
      <div class="win-text">
        <div class="win-title">${w.title}</div>
        <div class="win-date">${w.date}</div>
      </div>
    </div>
  `).join('');
}

// ── PIPELINE ──
const PRIORITY_ICONS = {urgent:'💎', normal:'⭐', low:'🔵'};
let draggedId = null;
let draggedSourceCol = null;

function renderPipeline() {
  ['progress','next','done'].forEach(col => {
    const list = document.getElementById('list-' + col);
    list.innerHTML = state.tasks[col].map(t => `
      <div class="task-card" draggable="true" data-id="${t.id}" data-col="${col}">
        <div class="task-card-top">
          <span class="priority" title="${t.priority}">${PRIORITY_ICONS[t.priority]}</span>
          <span class="task-title">${t.title}</span>
        </div>
        <div class="task-assignee">${t.assignee}</div>
      </div>
    `).join('');
    document.getElementById('count-' + col).textContent = state.tasks[col].length;
  });
  bindDrag();
}

function bindDrag() {
  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      draggedId = card.dataset.id;
      draggedSourceCol = card.dataset.col;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggedId = null;
      draggedSourceCol = null;
      document.querySelectorAll('.pipeline-col').forEach(c => c.classList.remove('drag-over'));
    });
  });

  document.querySelectorAll('.pipeline-col').forEach(col => {
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const targetCol = col.dataset.col;
      if (!draggedId || targetCol === draggedSourceCol) return;

      // Move task
      const idx = state.tasks[draggedSourceCol].findIndex(t => t.id === draggedId);
      if (idx === -1) return;
      const [task] = state.tasks[draggedSourceCol].splice(idx, 1);
      state.tasks[targetCol].push(task);

      // If moved to done
      if (targetCol === 'done' && draggedSourceCol !== 'done') {
        addXP(10);
        showFlash();
        // Add win
        const now = new Date();
        const dateStr = now.toLocaleDateString([], {month:'short', day:'numeric'});
        state.wins.unshift({title: task.title, icon:'🏆', date: dateStr});
        renderWins();
      }

      saveState();
      renderPipeline();
    });
  });
}

// ── INIT ──
updateXP();
renderDesks();
renderWins();
renderPipeline();
</script>
</body>
</html>
